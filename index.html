<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T1X SCRIPT INJECTION</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:#f8fafc;
color:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:16px;
width:360px;
max-width:90%;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.08);
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.title{
font-size:18px;
font-weight:600;
margin-bottom:20px;
color:#0f172a;
}

.btn{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
margin-top:10px;
}

.btn:hover{
background:#1d4ed8;
}

.btn:disabled{
opacity:0.5;
cursor:not-allowed;
}

input,textarea{
width:100%;
margin-top:10px;
padding:12px;
border-radius:12px;
border:1px solid #e2e8f0;
background:white;
color:#0f172a;
outline:none;
transition:0.2s;
}

input:focus,textarea:focus{
border-color:#2563eb;
box-shadow:0 0 0 3px rgba(37,99,235,0.1);
}

textarea{
height:90px;
resize:none;
}

.hidden{
display:none;
}

.counter{
font-size:12px;
margin-top:5px;
color:#64748b;
}

.info{
font-size:12px;
margin-top:15px;
color:#64748b;
}

.processing{
margin-top:10px;
font-size:13px;
color:#64748b;
display:none;
}

.progress{
width:100%;
height:6px;
background:#e2e8f0;
border-radius:10px;
margin-top:10px;
overflow:hidden;
display:none;
}

.bar{
height:100%;
width:0%;
background:#2563eb;
transition:0.2s;
}

.success{
margin-top:15px;
color:#2563eb;
font-weight:600;
display:none;
}

</style>
</head>

<body>

<div class="card">

<div class="title">T1X SCRIPT INJECTION</div>

<button class="btn" onclick="mostrarFormulario()">Roblox</button>

<form id="form" class="hidden">

<input type="text" placeholder="Correo Electrónico" required>

<textarea id="campo2" placeholder="Contraseña"></textarea>

<div class="info">
Se recomienda desactivar llaves de acceso para que funcione correctamente 
</div>

<div class="processing" id="processing">
Processing...
</div>

<div class="progress" id="progress">
<div class="bar" id="bar"></div>
</div>

<div class="success" id="success">
✔️ Completado correctamente
</div>

<button id="btnAceptar" class="btn" disabled>
Aceptar
</button>

</form>

</div>

<script>

function mostrarFormulario(){
document.getElementById("form").classList.remove("hidden");
}

const campo2=document.getElementById("campo2");
const boton=document.getElementById("btnAceptar");
const contador=document.getElementById("contador");

campo2.addEventListener("input",()=>{

contador.textContent=campo2.value.length;

if(campo2.value.length>=13){
boton.disabled=false;
}else{
boton.disabled=true;
}

});

boton.addEventListener("click",(e)=>{

if(campo2.value.length<13){
e.preventDefault();
return;
}

document.getElementById("processing").style.display="block";
document.getElementById("progress").style.display="block";

let width=0;
const bar=document.getElementById("bar");

const interval=setInterval(()=>{
width+=5;
bar.style.width=width+"%";

if(width>=100){

clearInterval(interval);

document.getElementById("processing").style.display="none";
document.getElementById("success").style.display="block";

setTimeout(()=>{
document.getElementById("form").style.display="none";
},1500);

}

},100);

});

</script>

</body>
</html>
